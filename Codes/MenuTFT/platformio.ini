[env:esp32-s3-devkitc-1-n8]
platform = espressif32
board = esp32-s3-devkitc-1-n8
framework = arduino
monitor_speed = 115200

; --- N16R8 HARDWARE UNLOCK ---
board_build.arduino.memory_type = qio_opi ; Enables OPI PSRAM (the 8MB part)
board_build.flash_mode = qio
board_build.psram_type = opi
board_build.partitions = default_16MB.csv ; Enables the full 16MB Flash
build_flags = 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ; TFT_eSPI Configuration (Add your pins here if not using a User_Setup.h)
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_BL=38
    -DTFT_BACKLIGHT_ON=HIGH

; --- AUTOMATIC LIBRARY DOWNLOADS ---
lib_deps =
    lvgl/lvgl@8.3.11
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.0.4