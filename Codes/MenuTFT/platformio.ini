[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; --- N16R8 WROOM-1 OVERRIDES ---
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

build_flags = 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DUSER_SETUP_LOADED=1
    -DILI9488_DRIVER=1         ; Driver for your 4.0" display
    -DTFT_WIDTH=320            ; Physical width
    -DTFT_HEIGHT=480           ; Physical height
    -DTFT_MOSI=13              ; Maps to display pin 6 (SDI)
    -DTFT_SCLK=12              ; Maps to display pin 7 (SCK)
    -DTFT_MISO=11              ; Maps to display pin 9 (SDO)
    -DTFT_CS=15                ; Maps to display pin 3 (CS)
    -DTFT_DC=2                 ; Maps to display pin 5 (DC/RS)
    -DTFT_RST=4                ; Maps to display pin 4 (RESET)
    -DSPI_FREQUENCY=27000000
    -I src
    -DLV_CONF_INCLUDE_SIMPLE

; --- REQUIRED LIBRARIES ---
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    lvgl/lvgl @ ~8.3.11
    bblanchon/ArduinoJson @ ^6.21.3