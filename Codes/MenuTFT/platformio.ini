[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; --- N16R8 HARDWARE UNLOCK (The real magic) ---
board_build.arduino.memory_type = qio_opi 
board_build.flash_mode = qio
board_build.psram_type = opi
board_build.partitions = default_16MB.csv 

build_flags = 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=13
    -DTFT_SCLK=12
    -DTFT_MISO=11
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=4
    -DTFT_BL=38
    -DTFT_BACKLIGHT_ON=HIGH
    -DTOUCH_CS=21
    -DSPI_TOUCH_FREQUENCY=2500000
    ; --- THE FIXES FOR YOUR ERRORS ---
    -I src                          ; Tells compiler to look in src for headers
    -DLV_CONF_INCLUDE_SIMPLE        ; Tells LVGL to look for "lv_conf.h" simply
    -DLV_LVGL_H_INCLUDE_SIMPLE      ; Fixes the "lvgl/lvgl.h" vs "lvgl.h" issue

lib_deps =
    lvgl/lvgl@8.3.11
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.0.4