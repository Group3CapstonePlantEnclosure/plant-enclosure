[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; --- N16R8 HARDWARE UNLOCK (The real magic) ---
board_build.arduino.memory_type = qio_opi 
board_build.flash_mode = qio
board_build.psram_type = opi
board_build.partitions = default_16MB.csv 

build_flags = 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ; --- NEW DRIVER FOR 4.0" ST7796 ---
    -DUSER_SETUP_LOADED=1
    -DST7796_DRIVER=1          ; Swapped from ILI9341
    -DTFT_WIDTH=320            ; These are the physical dimensions
    -DTFT_HEIGHT=480
    -DTFT_MOSI=13
    -DTFT_SCLK=12
    -DTFT_MISO=11
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=4
    -DTFT_BL=38
    -DTFT_BACKLIGHT_ON=HIGH
    ; --- SPEED TUNING ---
    -DSPI_FREQUENCY=40000000   ; ST7796 can handle 40-80MHz easily
    -DSPI_READ_FREQUENCY=20000000
    -DTOUCH_CS=21
    -DSPI_TOUCH_FREQUENCY=2500000
    ; --- LVGL FIXES ---
    -I src
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    
lib_deps =
    lvgl/lvgl@8.3.11
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.0.4